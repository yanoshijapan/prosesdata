<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yanoshi Leads Data Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#E63946">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Data Kepulangan">
    <link rel="apple-touch-icon" href="MONITORING.png">
    
    <style>
        :root {
            --primary: #E63946;
            --secondary: #FFC300;
            --bg-color: #F8F9FA;
            --surface: #FFFFFF;
            --text-main: #2B2D42;
            --success: #2a9d8f;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        
        body { background-color: var(--bg-color); color: var(--text-main); padding: 15px; }
        
        .container { max-width: 900px; margin: 0 auto; }
        .card { background: var(--surface); padding: 25px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 20px; }
        
        h1 { font-size: 24px; font-weight: 800; margin-bottom: 8px; }
        p.subtitle { font-size: 14px; color: #6c757d; margin-bottom: 20px; }
        
        .global-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.75); display: none; justify-content: center; align-items: center; 
            flex-direction: column; z-index: 10000; backdrop-filter: blur(4px);
        }
        .spinner {
            width: 50px; height: 50px; border: 5px solid rgba(255, 255, 255, 0.2);
            border-top-color: var(--secondary); border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 15px;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .loading-text { color: white; font-weight: 700; font-size: 16px; text-align: center; padding: 0 20px;}

        #upload-section { display: none; text-align: center; }
        .upload-area { border: 2px dashed #ccc; border-radius: 12px; padding: 40px 20px; margin-bottom: 24px; cursor: pointer; transition: all 0.3s; position: relative; }
        .upload-area input[type="file"] { position: absolute; width: 100%; height: 100%; top: 0; left: 0; opacity: 0; cursor: pointer; }
        #file-name { margin-top: 10px; color: var(--primary); font-weight: 600; word-wrap: break-word; overflow-wrap: break-word; }
        
        button { border: none; padding: 12px 20px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .btn-primary { background-color: var(--primary); color: white; box-shadow: 0 4px 15px rgba(230, 57, 70, 0.3); }
        .btn-secondary { background-color: var(--secondary); color: var(--text-main); }
        .btn-danger { background-color: #f1faee; color: var(--primary); border: 1px solid #ccc; }

        #dashboard-section { display: none; }
        
        /* Form Pencarian */
        .search-bar-container { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        .search-input { flex: 1; padding: 12px 15px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px; outline: none; font-family: 'Montserrat', sans-serif; transition: 0.3s;}
        .search-input:focus { border-color: var(--secondary); box-shadow: 0 0 0 3px rgba(255, 195, 0, 0.2); }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; margin-bottom: 20px; }
        .stat-card { background: #f8f9fa; border-left: 4px solid var(--primary); padding: 15px; border-radius: 8px; }
        .stat-title { font-size: 11px; color: #6c757d; font-weight: 600; text-transform: uppercase; }
        .stat-value { font-size: 22px; font-weight: 800; margin: 5px 0; }
        .stat-rate { font-size: 12px; color: var(--success); font-weight: 700; }

        .file-list { display: flex; flex-direction: column; gap: 12px; max-height: 450px; overflow-y: auto; padding-right: 5px; }
        .file-item { background: #fff; border: 1px solid #e2e8f0; padding: 15px; border-radius: 10px; display: flex; align-items: center; justify-content: space-between; gap: 15px; flex-wrap: wrap;}
        .file-info-group { display: flex; align-items: center; gap: 15px; flex: 1; min-width: 0; }
        .file-info { flex: 1; min-width: 0; word-wrap: break-word; overflow-wrap: break-word; } /* Aturan wrap text dari log perbaikan UX Mobile */[cite: 1]
        .file-actions { display: flex; gap: 8px; flex-wrap: wrap; }
        
        .custom-checkbox { width: 22px; height: 22px; cursor: pointer; accent-color: var(--primary); flex-shrink: 0;}
        .btn-dl-item { background-color: #f1f3f5; color: var(--text-main); padding: 8px 12px; font-size: 12px; border-radius: 6px; }
        .btn-kelola { background-color: var(--secondary); color: var(--text-main); padding: 8px 12px; font-size: 12px; border-radius: 6px; font-weight: 700; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 5000; padding: 15px; }
        .modal-content { background: var(--surface); width: 100%; max-width: 800px; max-height: 90vh; border-radius: 16px; display: flex; flex-direction: column; }
        .modal-header { padding: 15px 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .modal-body { padding: 15px 20px; overflow-y: auto; flex: 1; }
        .close-btn { background: none; border: none; font-size: 24px; cursor: pointer; color: var(--text-main); padding: 0; }
        
        .user-row { display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #f1f1f1; padding: 12px 0; gap: 15px; flex-wrap: wrap;}
        .user-detail { flex: 1; min-width: 0; word-wrap: break-word; overflow-wrap: break-word; } /* Aturan wrap text dari log perbaikan UX Mobile */[cite: 1]
        .user-name { font-weight: 700; font-size: 14px; }
        .user-wa { font-size: 12px; color: #666; }
        .month-badge { font-size: 10px; color: var(--text-main); background: #fffcf0; border: 1px solid var(--secondary); padding: 2px 6px; border-radius: 4px; margin-left: 5px; white-space: nowrap;}
        
        .status-group { display: flex; gap: 5px; flex-wrap: wrap; }
        .btn-status { padding: 8px 12px; font-size: 11px; border-radius: 4px; background: #e9ecef; color: #495057; border: 1px solid #ced4da; cursor: pointer; transition: 0.2s;}
        
        /* Warna untuk 6 Status Terurut */
        .btn-status.active-balas { background: #4dabf7; color: white; border-color: #4dabf7; }
        .btn-status.active-tertarik { background: #be4bdb; color: white; border-color: #be4bdb; } /* Warna Ungu */
        .btn-status.active-FU1 { background: var(--secondary); color: var(--text-main); border-color: var(--secondary); }
        .btn-status.active-FU2 { background: #fd7e14; color: white; border-color: #fd7e14; }
        .btn-status.active-FU3 { background: #fa5252; color: white; border-color: #fa5252; } /* Warna Merah Coral */
        .btn-status.active-closing { background: var(--success); color: white; border-color: var(--success); }

        @media (max-width: 550px) {
            .file-item { flex-direction: column; align-items: stretch; }
            .file-info-group { flex-direction: column; align-items: flex-start; }
            .file-actions { justify-content: flex-start; }
            .user-row { flex-direction: column; align-items: flex-start; }
            /* Membagi 6 tombol menjadi format grid 3 kolom pada layar HP */
            .status-group { width: 100%; display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
            .btn-status { padding: 10px 5px; text-align: center; }
            .search-bar-container { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>

    <div id="global-overlay" class="global-overlay">
        <div id="spinner-icon" class="spinner"></div>
        <div id="spinner-text" class="loading-text">Menghubungkan ke Sistem... Mohon tunggu...</div>
    </div>

    <div class="container">
        <div class="card" id="upload-section">
            <h1>Upload Data Awal</h1>
            <p class="subtitle">Unggah file XLSX/CSV leads kepulangan disini.</p>
            <div class="upload-area">
                <input type="file" id="file-input" accept=".xlsx, .csv">
                <p>Drag & Drop atau Klik untuk memilih file Excel</p>
                <div id="file-name">Belum ada file</div>
            </div>
            <button class="btn-primary" onclick="processInitialFile()">Proses & Simpan ke Sistem</button>
        </div>

        <div id="dashboard-section">
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 15px; margin-bottom: 20px;">
                    <div>
                        <h1>Dashboard Monitoring Leads</h1>
                        <p class="subtitle">kelola data dan update status leads.</p>
                    </div>
                    <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                        <button class="btn-secondary" onclick="downloadRaport()">📥 Download Raport</button>
                        <button class="btn-danger" onclick="resetSystem()">Reset Data</button>
                    </div>
                </div>
                <div class="stats-grid" id="stats-container"></div>
            </div>

            <div class="card" style="padding: 15px 25px;">
                <div class="search-bar-container">
                    <input type="text" id="search-input" class="search-input" placeholder="Ketik nama leads untuk mencari...">
                    <button class="btn-primary" onclick="handleSearch()">Cari Leads</button>
                </div>
            </div>

            <div class="card">
                <h2 style="font-size: 18px; margin-bottom: 15px;">List File Berdasarkan Bulan Pulang</h2>
                <div class="file-list" id="file-list-container"></div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="kelola-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title" style="font-size: 18px;">Kelola: -</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modal-user-list"></div>
        </div>
    </div>

    <script>
        // GANTI DENGAN URL WEB APP GAS ANDA
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwvScx1cTCecRpv11piDr7Dypcql9AKttvq7qKQejLRVcpufues6AOQIGqaecFpUbMCWA/exec";
        
        let masterData = []; 
        let metaData = {}; 
        let currentRawUpload = null;
        let syncTimeout = null;
        let lastSearchKeyword = ""; 

        function showLoading(text, spinner = true) {
            document.getElementById('global-overlay').style.display = 'flex';
            document.getElementById('spinner-icon').style.display = spinner ? 'block' : 'none';
            document.getElementById('spinner-text').innerText = text;
        }
        
        function hideLoading() {
            document.getElementById('global-overlay').style.display = 'none';
        }

        function saveToLocal() {
            localStorage.setItem('sysDataBackup', JSON.stringify({master: masterData, meta: metaData}));
        }

        function loadFromLocal() {
            const stored = localStorage.getItem('sysDataBackup');
            if (stored) {
                const parsed = JSON.parse(stored);
                masterData = parsed.master;
                metaData = parsed.meta;
                return true;
            }
            return false;
        }

        window.onload = function() {
            const hasLocalData = loadFromLocal();
            
            if (hasLocalData && masterData.length > 0) {
                showDashboard();
                syncWithCloud(false); 
            } else {
                showLoading("Menghubungkan ke Sistem... Mohon tunggu...");
                syncWithCloud(true);
            }
        };

        async function syncWithCloud(showLoaderIndicator) {
            try {
                const response = await fetch(GAS_URL);
                const result = await response.json();
                if(showLoaderIndicator) hideLoading();
                
                if (result.hasData) {
                    masterData = result.master;
                    metaData = result.meta || {};
                    saveToLocal(); 
                    showDashboard();
                } else if (showLoaderIndicator) {
                    document.getElementById('upload-section').style.display = 'block';
                }
            } catch (err) {
                if(showLoaderIndicator) hideLoading();
                if(!loadFromLocal()) {
                    alert("Sistem gagal terhubung dan tidak ada data yang tersimpan di perangkat ini.");
                }
            }
        }

        document.getElementById('file-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if(file) {
                document.getElementById('file-name').innerText = file.name;
                const reader = new FileReader();
                reader.onload = function(evt) {
                    const data = evt.target.result;
                    const workbook = XLSX.read(data, {type: 'binary'});
                    currentRawUpload = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {header: 1, defval: ""});
                };
                reader.readAsBinaryString(file);
            }
        });

        async function processInitialFile() {
            if(!currentRawUpload) { alert("Unggah file dulu!"); return; }
            document.getElementById('upload-section').style.display = 'none';
            
            let tempArray = [];
            for (let i = 1; i < currentRawUpload.length; i++) {
                let row = currentRawUpload[i];
                let nama = row[6] || "";      
                let tglPulang = row[7] || ""; 
                let noWa = String(row[10] || ""); 
                if(!nama && !tglPulang && !noWa) continue;

                noWa = noWa.replace(/\D/g, ''); 
                if (noWa.startsWith('0')) noWa = '62' + noWa.substring(1);
                else if (noWa.startsWith('8')) noWa = '62' + noWa;

                let dateValue = 0; let monthKey = "Tanpa Tanggal"; 
                if(tglPulang) {
                    let parsedDate = new Date(tglPulang);
                    if (!isNaN(parsedDate.getTime())) {
                        dateValue = parsedDate.getTime();
                        let yyyy = parsedDate.getFullYear();
                        let mm = String(parsedDate.getMonth() + 1).padStart(2, '0');
                        monthKey = `${yyyy}-${mm}`;
                    }
                }
                tempArray.push({ nama, tgl: tglPulang, wa: noWa, dateVal: dateValue, monthGroup: monthKey, status: "" });
            }

            tempArray.sort((a, b) => b.dateVal - a.dateVal);
            masterData = tempArray;
            metaData = {}; 

            showDashboard();
            triggerBackgroundSync(); 
        }

        function showDashboard() {
            document.getElementById('upload-section').style.display = 'none';
            document.getElementById('dashboard-section').style.display = 'block';
            renderStats();
            renderFileList();
        }

        function renderStats() {
            const total = masterData.length;
            const balas = masterData.filter(x => x.status === 'balas').length;
            const tertarik = masterData.filter(x => x.status === 'tertarik').length;
            const fu1 = masterData.filter(x => x.status === 'FU1').length;
            const fu2 = masterData.filter(x => x.status === 'FU2').length;
            const fu3 = masterData.filter(x => x.status === 'FU3').length;
            const closing = masterData.filter(x => x.status === 'closing').length;

            const rateBalas = total === 0 ? 0 : Math.round((balas / total) * 100);
            const rateClosing = total === 0 ? 0 : Math.round((closing / total) * 100);

            document.getElementById('stats-container').innerHTML = `
                <div class="stat-card"><div class="stat-title">Total Leads</div><div class="stat-value">${total}</div></div>
                <div class="stat-card"><div class="stat-title">Balas</div><div class="stat-value">${balas}</div><div class="stat-rate">Rate: ${rateBalas}%</div></div>
                <div class="stat-card"><div class="stat-title">Tertarik</div><div class="stat-value">${tertarik}</div></div>
                <div class="stat-card"><div class="stat-title">FU 1</div><div class="stat-value">${fu1}</div></div>
                <div class="stat-card"><div class="stat-title">FU 2</div><div class="stat-value">${fu2}</div></div>
                <div class="stat-card"><div class="stat-title">FU 3</div><div class="stat-value">${fu3}</div></div>
                <div class="stat-card"><div class="stat-title">Closing</div><div class="stat-value">${closing}</div><div class="stat-rate">Rate: ${rateClosing}%</div></div>
            `;
        }

        function renderFileList() {
            const container = document.getElementById('file-list-container');
            container.innerHTML = '';
            
            let grouped = new Map();
            masterData.forEach(item => {
                if(!grouped.has(item.monthGroup)) grouped.set(item.monthGroup, []);
                grouped.get(item.monthGroup).push(item);
            });

            for (let [month, items] of grouped.entries()) {
                let fileName = month === "Tanpa Tanggal" ? "sortir kepulangan (tanpa tanggal)" : `sortir kepulangan bulan ${month}`;
                
                // PERBAIKAN LOGIKA BACA CHECKBOX: Memaksa deteksi nilai secara spesifik (Anti-Auto Kapital Google Sheets)
                let checkState = metaData[`chk_${fileName}`];
                let isChecked = (checkState === true || String(checkState).toLowerCase() === 'true') ? 'checked' : '';

                container.innerHTML += `
                    <div class="file-item">
                        <div class="file-info-group">
                            <input type="checkbox" class="custom-checkbox" onchange="toggleCheck('${fileName}', this.checked)" ${isChecked}>
                            <div class="file-info">
                                <div style="font-weight: 700;">📁 ${fileName}</div>
                                <div style="font-size: 12px; color: #666;">${items.length} Pelanggan</div>
                            </div>
                        </div>
                        <div class="file-actions">
                            <button class="btn-dl-item" onclick="downloadFile('${month}', 'xlsx')">Unduh XLSX</button>
                            <button class="btn-dl-item" onclick="downloadFile('${month}', 'csv')">Unduh CSV</button>
                            <button class="btn-kelola" onclick="openKelola('${month}')">Kelola Status</button>
                        </div>
                    </div>
                `;
            }
        }
        function toggleCheck(fileName, state) {
            metaData[`chk_${fileName}`] = state;
            triggerBackgroundSync();
        }

        function handleSearch() {
            const inputField = document.getElementById('search-input');
            const keyword = inputField.value.trim().toLowerCase();
            
            if (!keyword) {
                alert("Silakan masukkan nama yang ingin dicari!");
                return;
            }
            
            lastSearchKeyword = keyword; 
            executeSearch(keyword);
        }

        document.getElementById('search-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') handleSearch();
        });

        function executeSearch(keyword) {
            const modal = document.getElementById('kelola-modal');
            document.getElementById('modal-title').innerText = `Hasil Pencarian: "${keyword}"`;
            const listContainer = document.getElementById('modal-user-list');
            listContainer.innerHTML = '';

            const results = masterData.filter(x => x.nama.toLowerCase().includes(keyword));
            
            if (results.length === 0) {
                listContainer.innerHTML = `<p style="text-align:center; color:#666; margin-top: 20px;">Tidak ditemukan pelanggan dengan nama "${keyword}".</p>`;
            } else {
                results.forEach((user) => {
                    listContainer.innerHTML += `
                        <div class="user-row">
                            <div class="user-detail">
                                <div class="user-name">
                                    ${user.nama} 
                                    <span class="month-badge">${user.monthGroup}</span>
                                </div>
                                <div class="user-wa">+${user.wa}</div>
                            </div>
                            <div class="status-group">
                                <button class="btn-status ${user.status === 'balas' ? 'active-balas' : ''}" onclick="updateStatus('${user.wa}', 'balas')">Balas</button>
                                <button class="btn-status ${user.status === 'tertarik' ? 'active-tertarik' : ''}" onclick="updateStatus('${user.wa}', 'tertarik')">Tertarik</button>
                                <button class="btn-status ${user.status === 'FU1' ? 'active-FU1' : ''}" onclick="updateStatus('${user.wa}', 'FU1')">FU1</button>
                                <button class="btn-status ${user.status === 'FU2' ? 'active-FU2' : ''}" onclick="updateStatus('${user.wa}', 'FU2')">FU2</button>
                                <button class="btn-status ${user.status === 'FU3' ? 'active-FU3' : ''}" onclick="updateStatus('${user.wa}', 'FU3')">FU3</button>
                                <button class="btn-status ${user.status === 'closing' ? 'active-closing' : ''}" onclick="updateStatus('${user.wa}', 'closing')">Closing</button>
                            </div>
                        </div>
                    `;
                });
            }
            modal.style.display = 'flex';
        }

        function openKelola(month) {
            const modal = document.getElementById('kelola-modal');
            document.getElementById('modal-title').innerText = `Kelola: ${month}`;
            const listContainer = document.getElementById('modal-user-list');
            listContainer.innerHTML = '';

            const usersInMonth = masterData.filter(x => x.monthGroup === month);
            usersInMonth.forEach((user) => {
                listContainer.innerHTML += `
                    <div class="user-row">
                        <div class="user-detail">
                            <div class="user-name">${user.nama}</div>
                            <div class="user-wa">+${user.wa}</div>
                        </div>
                        <div class="status-group">
                            <button class="btn-status ${user.status === 'balas' ? 'active-balas' : ''}" onclick="updateStatus('${user.wa}', 'balas')">Balas</button>
                            <button class="btn-status ${user.status === 'tertarik' ? 'active-tertarik' : ''}" onclick="updateStatus('${user.wa}', 'tertarik')">Tertarik</button>
                            <button class="btn-status ${user.status === 'FU1' ? 'active-FU1' : ''}" onclick="updateStatus('${user.wa}', 'FU1')">FU1</button>
                            <button class="btn-status ${user.status === 'FU2' ? 'active-FU2' : ''}" onclick="updateStatus('${user.wa}', 'FU2')">FU2</button>
                            <button class="btn-status ${user.status === 'FU3' ? 'active-FU3' : ''}" onclick="updateStatus('${user.wa}', 'FU3')">FU3</button>
                            <button class="btn-status ${user.status === 'closing' ? 'active-closing' : ''}" onclick="updateStatus('${user.wa}', 'closing')">Closing</button>
                        </div>
                    </div>
                `;
            });
            modal.style.display = 'flex';
        }

        function closeModal() { document.getElementById('kelola-modal').style.display = 'none'; }

        window.updateStatus = function(wa, newStatus) {
            let user = masterData.find(x => x.wa === wa);
            if(user) {
                
                // LOGIKA TOGGLE / UNDO BARU
                if (user.status === newStatus) {
                    // Jika tombol yang diklik adalah status yang sedang aktif, kosongkan statusnya (Undo)
                    user.status = ""; 
                } else {
                    // Jika tombol yang diklik berbeda, ubah ke status yang baru
                    user.status = newStatus; 
                }
                
                // Render ulang tampilan agar warna tombol langsung berubah
                if (document.getElementById('modal-title').innerText.includes('Hasil Pencarian')) {
                    executeSearch(lastSearchKeyword); 
                } else {
                    openKelola(user.monthGroup); 
                }
                
                renderStats();
                triggerBackgroundSync();
            }
        }

        function triggerBackgroundSync() {
            saveToLocal();
            clearTimeout(syncTimeout);
            syncTimeout = setTimeout(() => {
                showLoading("Menyimpan Perubahan...");
                fetch(GAS_URL, {
                    method: 'POST', mode: 'no-cors',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action: "SYNC", master: masterData, meta: metaData })
                }).then(() => {
                    showLoading("Tersimpan ✓", false);
                    setTimeout(() => hideLoading(), 800); 
                }).catch(err => {
                    showLoading("Disimpan Offline ✓", false);
                    setTimeout(() => hideLoading(), 1500);
                });
            }, 300); 
        }

        function downloadFile(month, format) {
            let items = masterData.filter(x => x.monthGroup === month);
            let arr = [["No", "Nama", "Nomor Whatsapp", "Tanggal Pulang", "Status"]];
            items.forEach((item, i) => arr.push([i+1, item.nama, item.wa, item.tgl, item.status]));
            
            const ws = XLSX.utils.aoa_to_sheet(arr);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Data");
            let safeName = month === "Tanpa Tanggal" ? "(tanpa tanggal)" : month;
            if(format === 'xlsx') XLSX.writeFile(wb, `sortir kepulangan bulan ${safeName}.xlsx`);
            else XLSX.writeFile(wb, `sortir kepulangan bulan ${safeName}.csv`);
        }

        function downloadRaport() {
            const total = masterData.length;
            const balas = masterData.filter(x => x.status === 'balas').length;
            const closing = masterData.filter(x => x.status === 'closing').length;
            const rateBalas = total === 0 ? 0 : Math.round((balas / total) * 100);
            const rateClosing = total === 0 ? 0 : Math.round((closing / total) * 100);

            let arr = [
                ["RINGKASAN RAPORT", "", "", "", ""],
                ["Rate Balas", `${balas} Data`, `(${rateBalas}%)`, "", ""],
                ["Rate Closing", `${closing} Data`, `(${rateClosing}%)`, "", ""],
                ["", "", "", "", ""], 
                ["No Urut", "Tanggal Pulang", "Nama", "Nomor Whatsapp", "Status Realtime"]
            ];
            masterData.forEach((item, i) => { arr.push([i+1, item.tgl, item.nama, item.wa, item.status || "Belum ada tindakan"]); });
            
            const ws = XLSX.utils.aoa_to_sheet(arr);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Raport_Master");
            XLSX.writeFile(wb, `Raport Keseluruhan - ${new Date().toISOString().split('T')[0]}.xlsx`);
        }

        function resetSystem() {
            if(confirm("AWAS! Ini akan menghapus SELURUH data secara permanen dari Sistem Lokal maupun Server Google. Lanjutkan?")) {
                let verifikasi = prompt("Tindakan ini sangat fatal. Masukkan kode verifikasi 5 angka '00000' untuk melanjutkan penghapusan:");
                if (verifikasi === "00000") {
                    showLoading("Menghapus seluruh sistem...");
                    localStorage.removeItem('sysDataBackup');
                    fetch(GAS_URL, {
                        method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain' },
                        body: JSON.stringify({ action: "DELETE" })
                    }).then(() => {
                        masterData = []; metaData = {};
                        document.getElementById('dashboard-section').style.display = 'none';
                        document.getElementById('upload-section').style.display = 'block';
                        document.getElementById('file-input').value = "";
                        document.getElementById('file-name').innerText = "Belum ada file";
                        hideLoading();
                        alert("Sistem berhasil direset."); 
                    });
                } else if (verifikasi !== null) {
                    alert("Kode verifikasi salah! Penghapusan sistem dibatalkan demi keamanan.");
                }
            }
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('PWA Service Worker Terdaftar!'))
                .catch(err => console.error('PWA Gagal Terdaftar:', err));
            });
        }
        
    </script>
</body>
